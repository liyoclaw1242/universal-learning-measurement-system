<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="hdr">
      <span class="brand">ULMS · LEARN</span>
      <span id="conn" class="conn" data-state="unknown" title="checking connection">●</span>
    </header>

    <main class="body">
      <div id="page-info" class="page-info">
        <span id="page-type" class="badge">—</span>
        <span id="page-title" class="title">(loading)</span>
      </div>

      <button id="send-btn" class="send" disabled>Send to ULMS</button>

      <div id="result" class="result" aria-live="polite"></div>
    </main>

    <footer class="ftr">
      <details>
        <summary>Settings</summary>
        <label>
          server
          <input id="server-url" type="text" value="http://127.0.0.1:9527" spellcheck="false" />
        </label>
        <label>
          token
          <input id="token" type="password" placeholder="paste token from ULMS Home" />
        </label>
        <button id="save-cfg" class="save">save</button>
      </details>
    </footer>

    <script src="popup.js" type="module"></script>
  </body>
</html>
